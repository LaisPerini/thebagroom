<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Cormorant Garamond', serif;
}

/* HEADER */
header{
width:100%;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
position:fixed;
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid #eee;
}

header h1{
letter-spacing:8px;
font-size:22px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.produto{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.produto img{
width:100%;
}

.nome{font-size:30px;}
.preco{font-size:20px;margin:10px 0;}

.desc{
color:#444;
line-height:1.6;
margin-bottom:20px;
}

/* ========================= */
/* ALUGUEL */
/* ========================= */

.aluguel{
margin-top:20px;
}

.opcao{
border:1px solid #ddd;
padding:14px;
margin-bottom:10px;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.opcao input{
transform:scale(1.2);
}

.opcao:hover{
border-color:#000;
}

/* DATA */
input[type="date"]{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-top:10px;
}

/* BOTÃO */
.botao{
display:block;
width:100%;
margin-top:20px;
padding:16px;
background:#000;
color:#fff;
border-radius:40px;
text-align:center;
text-decoration:none;
letter-spacing:2px;
font-size:12px;
}

/* MOBILE */
@media(max-width:700px){
.produto{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<div class="produto">

<img src="https://i.imgur.com/2nCt3Sbl.jpg">

<div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

<div class="desc">
Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
</div>

<!-- ========================= -->
<!-- ALUGUEL -->
<!-- ========================= -->

<div class="aluguel">

<label class="opcao">
<input type="radio" name="dias" value="4 dias - R$ 418,95">
4 dias - R$ 418,95
</label>

<label class="opcao">
<input type="radio" name="dias" value="7 dias - R$ 485,10">
7 dias - R$ 485,10
</label>

<label class="opcao">
<input type="radio" name="dias" value="10 dias - R$ 540,75">
10 dias - R$ 540,75
</label>

<label class="opcao">
<input type="radio" name="dias" value="15 dias - R$ 639,45">
15 dias - R$ 639,45
</label>

<label class="opcao">
<input type="radio" name="dias" value="20 dias - R$ 705,60">
20 dias - R$ 705,60
</label>

<label class="opcao">
<input type="radio" name="dias" value="30 dias - R$ 771,75">
30 dias - R$ 771,75
</label>

<!-- DATA -->
<input type="date" id="data">

<!-- BOTÃO -->
<a class="botao" onclick="alugar()">ALUGAR AGORA</a>

</div>

</div>

</div>

</div>

<script>
function alugar(){

let dias = document.querySelector('input[name="dias"]:checked');
let data = document.getElementById('data').value;

if(!dias){
alert("Selecione o período");
return;
}

let mensagem = `Olá! Quero alugar a Bvlgari Serpenti Verde\n${dias.value}\nData: ${data}`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(mensagem)}`);
}
</script>

</body>
</html>
