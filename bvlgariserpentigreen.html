<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Playfair Display', serif;
color:#111;
overflow-x:hidden;
}

header{
padding:18px;
display:flex;
justify-content:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.produto{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.nome{
font-size:32px;
line-height:1.2;
margin-bottom:8px;
}

.preco{
font-family:'Inter';
font-size:16px;
color:#444;
margin-bottom:15px;
}

.desc{
color:#666;
line-height:1.6;
margin-bottom:20px;
}

/* GALERIA */
.galeria{
overflow:hidden;
border-radius:18px;
margin-bottom:20px;
}

.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
gap:10px;
}

.slider img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
flex:0 0 100%;
scroll-snap-align:center;
border-radius:18px;
}

.slider::-webkit-scrollbar{display:none;}

.dots{
display:flex;
justify-content:center;
gap:6px;
margin-top:10px;
}

.dots span{
width:6px;
height:6px;
background:#ccc;
border-radius:50%;
}

.dots span.active{
background:#000;
width:18px;
border-radius:10px;
}

/* 🔥 ESTILO DIOR */
.periodos{
border-top:1px solid #eee;
margin-top:20px;
}

.periodo{
padding:18px 0;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
font-family:'Inter';
font-size:15px;
cursor:pointer;
}

.periodo span{
color:#777;
}

.periodo.active{
font-weight:500;
}

/* INPUTS */
#dataInicio, #cep{
width:100%;
padding:12px 0;
border:none;
border-bottom:1px solid #ddd;
background:transparent;
font-family:'Inter';
margin-top:15px;
}

/* BOTÃO */
.btn{
margin-top:30px;
padding:20px;
background:#000;
color:#fff;
border-radius:50px;
text-align:center;
letter-spacing:5px;
font-size:12px;
cursor:pointer;
}

/* FRETE */
.frete-opcao{
border:1px solid #eee;
padding:12px;
margin-top:8px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-family:'Inter';
}

.frete-opcao.active{
background:#000;
color:#fff;
}

@media(max-width:700px){
.produto{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<div class="produto">

<div class="galeria">
  <div class="slider" id="slider">
    <img src="https://i.imgur.com/moxJous.jpg">
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="dots" id="dots"></div>
</div>

<div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

<div class="desc">
Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
</div>

<!-- 🔥 NOVO MODELO -->
<div class="periodos">

<div class="periodo active" onclick="selecionarDias(4,this)">
4 dias <span>R$ 418,95</span>
</div>

<div class="periodo" onclick="selecionarDias(7,this)">
7 dias <span>R$ 485,10</span>
</div>

<div class="periodo" onclick="selecionarDias(10,this)">
10 dias <span>R$ 540,75</span>
</div>

<div class="periodo" onclick="selecionarDias(15,this)">
15 dias <span>R$ 639,45</span>
</div>

<div class="periodo" onclick="selecionarDias(20,this)">
20 dias <span>R$ 705,60</span>
</div>

<div class="periodo" onclick="selecionarDias(30,this)">
30 dias <span>R$ 771,75</span>
</div>

</div>

<!-- INPUT OCULTO -->
<input type="radio" name="dias" value="4" checked hidden>
<input type="radio" name="dias" value="7" hidden>
<input type="radio" name="dias" value="10" hidden>
<input type="radio" name="dias" value="15" hidden>
<input type="radio" name="dias" value="20" hidden>
<input type="radio" name="dias" value="30" hidden>

<input type="text" id="dataInicio" placeholder="Selecione a data">
<div id="devolucao"></div>

<input type="text" id="cep" placeholder="Digite seu CEP">
<button onclick="calcularFrete()">Calcular frete</button>

<div id="freteResultado"></div>
<div id="freteSelecionado"></div>

<div class="btn" onclick="alugar()">ALUGAR AGORA</div>

</div>

</div>

</div>

<script>

/* selecionar dias */
function selecionarDias(dias, el){

document.querySelectorAll('.periodo').forEach(p=>p.classList.remove('active'));
el.classList.add('active');

document.querySelector(`input[value="${dias}"]`).checked = true;

atualizarDevolucao();
}

/* calendário */
flatpickr("#dataInicio", {
locale:"pt",
dateFormat:"d/m/Y",
minDate:new Date().fp_incr(3),
onChange:()=>atualizarDevolucao()
});

/* devolução */
function atualizarDevolucao(){
let dias = document.querySelector('input[name="dias"]:checked');
let data = document.getElementById('dataInicio').value;

if(!dias || !data) return;

let [d,m,y] = data.split("/");
let dt = new Date(y,m-1,d);
dt.setDate(dt.getDate()+parseInt(dias.value));

document.getElementById('devolucao').innerHTML =
`Devolução prevista: <strong>${dt.toLocaleDateString('pt-BR')}</strong>`;
}

/* frete */
let freteSelecionado=null;

async function calcularFrete(){

let cep=document.getElementById("cep").value;
let res=document.getElementById("freteResultado");

res.innerHTML="Calculando...";

let r=await fetch("https://thebagroomtest.onrender.com/frete",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({to:{postal_code:cep}})
});

let data=await r.json();

res.innerHTML="";

data.forEach(f=>{
let div=document.createElement("div");
div.className="frete-opcao";
div.innerHTML=`${f.name} • R$ ${parseFloat(f.price).toFixed(2)} • ${f.delivery_time} dias`;

div.onclick=()=>{
document.querySelectorAll('.frete-opcao').forEach(x=>x.classList.remove('active'));
div.classList.add('active');

freteSelecionado=f;

document.getElementById("freteSelecionado").innerHTML=
`Frete escolhido: ${f.name} • R$ ${parseFloat(f.price).toFixed(2)}`;
};

res.appendChild(div);
});

}

/* whatsapp */
function alugar(){

let dias=document.querySelector('input[name="dias"]:checked').value;
let data=document.getElementById('dataInicio').value;

if(!data || !freteSelecionado){
alert("Preencha tudo");
return;
}

let valor=document.querySelector('.periodo.active span').innerText;

let total=parseFloat(valor.replace("R$","").replace(",","."))
+parseFloat(freteSelecionado.price);

let msg=`Olá, quero alugar a Bvlgari Serpenti Verde

Data recebimento: ${data}
Período: ${dias} dias

Frete: ${freteSelecionado.name} • R$ ${freteSelecionado.price}

Valor total: R$ ${total.toFixed(2).replace(".",",")}`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(msg)}`);
}

/* dots */
let slider=document.getElementById("slider");
let dotsContainer=document.getElementById("dots");

[...slider.children].forEach((_,i)=>{
let d=document.createElement("span");
if(i===0)d.classList.add("active");
dotsContainer.appendChild(d);
});

slider.addEventListener("scroll",()=>{
let i=Math.round(slider.scrollLeft/slider.clientWidth);
dotsContainer.querySelectorAll("span").forEach(d=>d.classList.remove("active"));
dotsContainer.children[i]?.classList.add("active");
});

</script>

</body>
</html>
