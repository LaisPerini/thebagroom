<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>
body{
margin:0;
background:#faf9f7;
font-family:'Playfair Display', serif;
color:#111;
overflow-x:hidden;
}

header{
padding:18px;
display:flex;
justify-content:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:50px;}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.produto{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.produto img{
width:100%;
border-radius:10px;
}

.nome{
font-size:32px;
line-height:1.2;
margin-top:10px;
margin-bottom:8px;
}

.preco{
font-family:'Inter', sans-serif;
font-size:18px;
margin:10px 0;
letter-spacing:0.5px;
color:#444;
}

.desc{
color:#555;
line-height:1.6;
margin-bottom:20px;
}

.opcoes{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.opcao{
border:1px solid #e5e5e5;
padding:12px;
border-radius:12px;
cursor:pointer;
font-family:'Inter', sans-serif;
display:flex;
justify-content:center;
}

.opcao input{display:none;}

.opcao.active{
background:#000;
color:#fff;
}

#dataInicio, #cep{
width:220px;
padding:10px;
border:none;
border-bottom:1px solid #ccc;
background:transparent;
font-family:'Inter';
}

#devolucao{
margin-top:10px;
font-family:'Inter';
}

.btn{
margin-top:30px;
padding:20px;
background:linear-gradient(180deg,#111,#000);
color:#fff;
border-radius:50px;
text-align:center;
letter-spacing:6px;
font-size:11px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
transition:0.3s;
}

.btn:active{
transform:scale(0.97);
}

.btn-frete{
margin-top:10px;
padding:10px;
background:#000;
color:#fff;
border-radius:20px;
border:none;
}

.flatpickr-calendar{
border-radius:16px;
font-family:'Inter';
}

.flatpickr-day.selected{
background:#000;
border-color:#000;
}

.frete-opcao{
border:1px solid #e5e5e5;
padding:12px;
margin-top:8px;
border-radius:12px;
cursor:pointer;
font-family:'Inter';
transition:0.2s;
text-align:center;
}

.frete-opcao.active{
background:#000;
color:#fff;
border-color:#000;
transform:scale(0.98);
}

.flatpickr-day.disabled{
color:#ccc;
}

.galeria{
position:relative;
overflow:hidden;
border-radius:18px;
width:100%;
margin-top:10px;
margin-bottom:20px;
}


.slider{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
gap:12px;
padding-bottom:10px;
width:100%;
max-width:100%;
padding:0 5px;
}

.slider img{
width:100%;
max-width:100%;
aspect-ratio:4/5;
object-fit:cover;
flex:0 0 100%;
scroll-snap-align:center;
border-radius:18px;
transition:transform 0.4s ease;
cursor:pointer;
}

.slider img:active{
transform:scale(0.98);
}

.slider::-webkit-scrollbar{
display:none;
}

/* DOTS CHANEL STYLE */
.dots{
display:flex;
justify-content:center;
gap:6px;
margin-top:10px;
}

.dots span{
width:6px;
height:6px;
background:#ccc;
border-radius:50%;
transition:0.3s;
}

.dots span.active{
background:#000;
width:18px;
border-radius:10px;
}

/* BRILHO SUAVE (luxo discreto) */
.galeria::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:40%;
height:100%;
background:linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
transform:skewX(-20deg);
animation:luxoBrilho 5s infinite;
}

@keyframes luxoBrilho{
0%{left:-120%;}
100%{left:140%;}
}

/* ZOOM PREMIUM */
.zoom-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeIn 0.3s ease;
}

.zoom-overlay img{
max-width:92%;
max-height:92%;
border-radius:14px;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@media(max-width:700px){
.produto{grid-template-columns:1fr;}
}

/* BOTÃO MENU */
.menu-mobile-btn{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
}

/* MENU LATERAL PREMIUM */
.menu-mobile{
position:fixed;
top:0;
left:-100%;
width:85%;
max-width:320px;
height:100vh;
background:rgba(255,255,255,0.98);
backdrop-filter:blur(14px);
transition:0.45s cubic-bezier(0.22,1,0.36,1);
z-index:2000;
padding-top:100px;
}

.menu-mobile.open{
left:0;
}

/* FECHAR */
.close-menu{
position:absolute;
top:24px;
right:24px;
font-size:30px;
cursor:pointer;
}

/* LINKS */
.menu-mobile-inner{
display:flex;
flex-direction:column;
gap:26px;
padding-left:30px;
}

.menu-mobile-inner a{
font-family:'Cormorant Garamond', serif;
font-size:22px;
letter-spacing:1px;
text-decoration:none;
color:#000;
transition:0.3s;
}

.menu-mobile-inner a:hover{
opacity:0.6;
}

/* DESKTOP */
@media(min-width:1024px){
  
.top-space{height:10px;}

  .produto{
    display:flex;
    gap:80px;
    max-width:1100px;
    margin:60px auto 60px;
    align-items:flex-start;
  }

  .galeria{
    flex:1;
    max-width:600px;
  }

  .info{
    flex:1;
    max-width:400px;
  }
  
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>

  <!-- botão menu -->
  <div class="menu-mobile-btn" onclick="toggleMenuMobile()">☰</div>

  <!-- menu lateral -->
  <nav class="menu-mobile" id="menuMobile">

    <div class="close-menu" onclick="toggleMenuMobile()">×</div>

    <div class="menu-mobile-inner">
      <a href="index.html">Início</a>
      <a href="aluguel.html">Alugar </a>
      <a href="Como Funciona.html">Como Desapegar</a>
      <a href="autenticidade.html">Autenticidade</a>
      <a href="quem-somos.html">Sobre</a>
    </div>

  </nav>
</header>

<div class="top-space"></div>

<div class="container">

<div class="produto">

  <!-- ESQUERDA (IMAGEM) -->
  <div class="galeria">

    <div class="slider" id="slider">
      <img src="https://i.imgur.com/27huvzI.jpg">
      <img src="https://i.imgur.com/27huvzI.jpg">
      <img src="https://i.imgur.com/27huvzI.jpg">
    </div>

    <div class="dots" id="dots"></div>

  </div>

  <!-- DIREITA (INFO + BOTÃO) -->
  <div class="info">

    <div class="nome">Bvlgari Serpenti Verde</div>
    <div class="preco">A partir de R$ 490</div>

    <div class="desc">
      Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
    </div>

    <div class="opcoes">
      <label class="opcao active"><input type="radio" name="dias" value="4" checked>4 dias • R$ 490</label>
      <label class="opcao"><input type="radio" name="dias" value="7">7 dias • R$ 690</label>
      <label class="opcao"><input type="radio" name="dias" value="10">10 dias • R$ 890</label>
      <label class="opcao"><input type="radio" name="dias" value="15">15 dias • R$ 1.090</label>
      <label class="opcao"><input type="radio" name="dias" value="20">20 dias • R$1.290</label>
      <label class="opcao"><input type="radio" name="dias" value="30">30 dias • R$1.690</label>
    </div>

    <br>

    <input type="text" id="dataInicio" placeholder="Selecione a data">

    <div id="devolucao"></div>

    <br>

    <input type="text" id="cep" placeholder="Digite seu CEP">

    <button class="btn-frete" onclick="calcularFrete()">Calcular frete</button>

    <div id="freteResultado"></div>
    <div id="freteSelecionado" style="margin-top:10px; font-family:'Inter';"></div>

    <div class="btn" onclick="alugar()">ALUGAR AGORA</div>

  </div>

</div>

 <!-- <div class="btn" onclick="alugar()">ALUGAR AGORA</div> -->

</div>

</div>

</div>

<script>

function toggleMenuMobile(){
  document.getElementById('menuMobile').classList.toggle('open');
}



/* seleção dias */
document.querySelectorAll('.opcao').forEach(opcao => {
  opcao.addEventListener('click', () => {
    document.querySelectorAll('.opcao').forEach(o => o.classList.remove('active'));
    opcao.classList.add('active');
    atualizarDevolucao();
  });
});

/* 🔥 CALENDÁRIO */
async function iniciarCalendario(){

  let response = await fetch("https://thebagroomtest.onrender.com/datas/serpenti-verde");
  let alugueis = await response.json();

  let datasBloqueadas = [];

  alugueis.forEach(a => {
    let inicio = new Date(a.inicio);
    let fim = new Date(a.fim);

    for(let d = new Date(inicio); d <= fim; d.setDate(d.getDate()+1)){
      datasBloqueadas.push(new Date(d));
    }
  });

  flatpickr("#dataInicio", {
    locale: "pt",
    dateFormat: "d/m/Y",
    minDate: new Date().fp_incr(3),
    disableMobile: true,
    disable: datasBloqueadas,
    onChange: () => atualizarDevolucao()
  });

}

iniciarCalendario();

/* devolução */
function atualizarDevolucao(){

let dias = document.querySelector('input[name="dias"]:checked');
let dataInput = document.getElementById('dataInicio').value;

if(!dias || !dataInput) return;

let partes = dataInput.split("/");
let data = new Date(partes[2], partes[1]-1, partes[0]);

data.setDate(data.getDate() + parseInt(dias.value));

document.getElementById('devolucao').innerHTML =
`Devolução prevista: <strong>${data.toLocaleDateString('pt-BR')}</strong>`;
}

/* 🔥 FRETE COM SELEÇÃO */
let freteSelecionado = null;

async function calcularFrete(){

let cep = document.getElementById("cep").value;
let resultado = document.getElementById("freteResultado");

if(!cep){
resultado.innerHTML = "Digite o CEP";
return;
}

resultado.innerHTML = "Calculando...";

let response = await fetch("https://thebagroomtest.onrender.com/frete", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ to:{ postal_code:cep } })
});

let data = await response.json();

let html = "";

data
.filter(f => (f.name === "PAC" || f.name === "SEDEX"))
.filter(f => f.price && f.delivery_time)
.forEach(frete => {

html += `
<div class="frete-opcao"
onclick="selecionarFrete('${frete.name}', ${frete.price}, ${frete.delivery_time}, this)"
style="border:1px solid #ddd;padding:10px;margin-top:8px;border-radius:10px;cursor:pointer;font-family:'Inter';">
${frete.name} • R$ ${parseFloat(frete.price).toFixed(2)} • ${frete.delivery_time} dias
</div>
`;

});

resultado.innerHTML = html || "Nenhuma opção disponível";

}

function selecionarFrete(nome, preco, prazo, el){

freteSelecionado = { nome, preco, prazo };

// remove seleção de todos
document.querySelectorAll('.frete-opcao').forEach(item=>{
item.classList.remove('active');
});

// aplica no clicado
el.classList.add('active');

// texto abaixo
document.getElementById("freteSelecionado").innerHTML =
`Frete escolhido: <strong>${nome} • R$ ${preco.toFixed(2)}</strong>`;

}

/* 🔥 WHATSAPP COMPLETO */
function alugar(){

let diasSelecionado = document.querySelector('input[name="dias"]:checked');
let data = document.getElementById('dataInicio').value;

if(!data){
alert("Escolha a data");
return;
}

if(!freteSelecionado){
alert("Escolha o frete");
return;
}

// valor aluguel
let textoOpcao = diasSelecionado.parentElement.innerText;
let valorMatch = textoOpcao.match(/R\$ ([\d,]+)/);
let valor = valorMatch ? parseFloat(valorMatch[1].replace(",", ".")) : 0;

// total
let total = valor + freteSelecionado.preco;
let totalFormatado = total.toFixed(2).replace(".", ",");

let mensagem = `Olá, quero alugar a 
Bvlgari Serpenti Verde

Data recebimento: ${data}
Período: ${textoOpcao}

Frete: ${freteSelecionado.nome} • R$ ${freteSelecionado.preco.toFixed(2)} • ${freteSelecionado.prazo} dias

Valor total: R$ ${totalFormatado}`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(mensagem)}`);

}

/* ZOOM */
let zoomOverlay = document.createElement("div");
zoomOverlay.className = "zoom-overlay";
zoomOverlay.innerHTML = "<img>";
document.body.appendChild(zoomOverlay);

let zoomImg = zoomOverlay.querySelector("img");

document.querySelectorAll('.slider img').forEach(img => {
  img.addEventListener('click', () => {
    zoomImg.src = img.src;
    zoomOverlay.style.display = "flex";
  });
});

zoomOverlay.addEventListener('click', () => {
  zoomOverlay.style.display = "none";
});

/* DOTS */
let slider = document.getElementById("slider");
let images = slider.querySelectorAll("img");
let dotsContainer = document.getElementById("dots");

images.forEach((_, i) => {
  let dot = document.createElement("span");
  if(i === 0) dot.classList.add("active");
  dotsContainer.appendChild(dot);
});

let dots = dotsContainer.querySelectorAll("span");

slider.addEventListener("scroll", () => {
  let index = Math.round(slider.scrollLeft / slider.clientWidth);

  dots.forEach(d => d.classList.remove("active"));
  if(dots[index]) dots[index].classList.add("active");
});


</script>

</body>
</html>
