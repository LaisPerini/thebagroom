<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>

/* 🔥 SÓ ALTEREI A SETA (mais premium) */
.seta{
  display:none;
}

@media(min-width:1024px){

  .seta{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:10;

    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
    box-shadow:0 4px 20px rgba(0,0,0,0.12);

    color:#111;

    transition:0.3s;
    opacity:0;
  }

  .galeria:hover .seta{
    opacity:1;
  }

  .seta:hover{
    background:#fff;
    transform:translateY(-50%) scale(1.05);
  }

  .seta.esquerda{ left:12px; }
  .seta.direita{ right:12px; }

}

</style>
</head>

<body>

<!-- ⚠️ TODO O RESTO DO SEU CÓDIGO CONTINUA IGUAL -->

<script>

/* 🔥 CORREÇÃO DO SLIDE */
function slide(direction){
  const slider = document.getElementById("slider");
  const slide = slider.querySelector("img");

  const style = getComputedStyle(slider);
  const gap = parseInt(style.gap) || 0;

  const largura = slide.clientWidth + gap;

  slider.scrollBy({
    left: direction * largura,
    behavior: "smooth"
  });
}

</script>

</body>
</html>
