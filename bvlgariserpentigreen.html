<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Playfair Display', serif;
color:#111;
}

/* HEADER */
header{
width:100%;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
position:fixed;
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid #eee;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
font-weight:500;
}

.top-space{height:70px;}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.produto{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.produto img{
width:100%;
border-radius:10px;
}

/* TEXTOS */
.nome{
font-size:28px;
font-weight:500;
}

.preco{
font-family:'Inter', sans-serif;
font-size:18px;
margin:10px 0;
}

.desc{
color:#555;
line-height:1.6;
margin-bottom:20px;
}

/* OPÇÕES */
.opcoes{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.opcao{
border:1px solid #e5e5e5;
padding:12px;
border-radius:12px;
cursor:pointer;
font-family:'Inter', sans-serif;
font-size:14px;
display:flex;
justify-content:center;
align-items:center;
transition:0.2s;
}

.opcao input{
display:none;
}

.opcao:hover{
border-color:#000;
}

.opcao.active{
background:#000;
color:#fff;
border-color:#000;
}

/* INPUT */
#dataInicio, #cep{
width:220px;
padding:8px;
border:none;
border-bottom:1px solid #ccc;
background:transparent;
font-size:13px;
margin-top:10px;
font-family:'Inter', sans-serif;
}

/* TEXTO DEVOLUÇÃO */
#devolucao{
margin-top:10px;
font-size:14px;
font-family:'Inter', sans-serif;
color:#444;
}

/* BOTÕES */
.btn{
display:block;
margin-top:25px;
padding:18px;
background:#000;
color:#fff;
border-radius:40px;
text-align:center;
text-decoration:none;
letter-spacing:4px;
font-size:12px;
}

.btn-frete{
margin-top:12px;
padding:10px 18px;
background:#000;
color:#fff;
border:none;
border-radius:20px;
font-size:11px;
cursor:pointer;
}

/* FRETE */
#freteResultado{
margin-top:15px;
font-size:14px;
font-family:'Inter', sans-serif;
}

/* MOBILE */
@media(max-width:700px){
.produto{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<div class="produto">

<img src="https://i.imgur.com/2nCt3Sbl.jpg">

<div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

<div class="desc">
Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
</div>

<!-- OPÇÕES -->
<div class="opcoes">

<label class="opcao active">
<input type="radio" name="dias" value="4" checked>
4 dias • R$ 418,95
</label>

<label class="opcao">
<input type="radio" name="dias" value="7">
7 dias • R$ 485,10
</label>

<label class="opcao">
<input type="radio" name="dias" value="10">
10 dias • R$ 540,75
</label>

<label class="opcao">
<input type="radio" name="dias" value="15">
15 dias • R$ 639,45
</label>

<label class="opcao">
<input type="radio" name="dias" value="20">
20 dias • R$ 705,60
</label>

<label class="opcao">
<input type="radio" name="dias" value="30">
30 dias • R$ 771,75
</label>

</div>

<!-- DATA -->
<div style="margin-top:20px;">
  
  <div style="font-family:'Inter', sans-serif; font-size:12px; color:#888;">
    Data de recebimento
  </div>

  <input type="date" id="dataInicio">

</div>

<div id="devolucao"></div>

<input type="text" id="cep" placeholder="Digite seu CEP">

<button class="btn-frete" onclick="calcularFrete()">Calcular frete</button>

<div id="freteResultado"></div>

<a class="btn" onclick="alugar()">ALUGAR AGORA</a>

</div>

</div>

</div>

<script>

/* seleção visual */
document.querySelectorAll('.opcao').forEach(opcao => {
  opcao.addEventListener('click', () => {
    document.querySelectorAll('.opcao').forEach(o => o.classList.remove('active'));
    opcao.classList.add('active');
    atualizarDevolucao();
  });
});

/* calcular devolução */
function atualizarDevolucao(){

let inicio = document.getElementById('dataInicio').value;
let dias = document.querySelector('input[name="dias"]:checked');

if(!inicio || !dias) return;

let data = new Date(inicio);
data.setDate(data.getDate() + parseInt(dias.value));

let formatada = data.toLocaleDateString('pt-BR', {
day:'2-digit',
month:'long'
});

document.getElementById('devolucao').innerHTML =
`Devolução prevista: <strong>${formatada}</strong>`;
}

/* eventos */
document.getElementById('dataInicio').addEventListener('change', atualizarDevolucao);

/* frete (mantido igual) */
async function calcularFrete(){
let cep = document.getElementById("cep").value;
let resultado = document.getElementById("freteResultado");

if(!cep){
resultado.innerHTML = "Digite o CEP";
return;
}

resultado.innerHTML = "Calculando...";

let response = await fetch("https://thebagroomtest.onrender.com/frete", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ to:{ postal_code:cep } })
});

let data = await response.json();

let html = "";

data
.filter(f => (f.name === "PAC" || f.name === "SEDEX"))
.filter(f => f.price && f.delivery_time)
.forEach(frete => {
html += `<div>${frete.name} • R$ ${frete.price} • ${frete.delivery_time} dias</div>`;
});

resultado.innerHTML = html || "Nenhuma opção disponível";
}

/* whatsapp */
function alugar(){

let dias = document.querySelector('input[name="dias"]:checked').value;
let inicio = document.getElementById('dataInicio').value;

if(!inicio){
alert("Escolha a data");
return;
}

let mensagem = `Olá! Quero alugar a Bvlgari Serpenti Verde
Data: ${inicio}
Período: ${dias} dias`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(mensagem)}`);

}

</script>

</body>
</html>
