<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<!-- FLATPICKR -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Playfair Display', serif;
color:#111;
}

/* HEADER */
header{
padding:18px;
display:flex;
justify-content:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.produto{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.produto img{
width:100%;
border-radius:10px;
}

.nome{font-size:28px;}
.preco{
font-family:'Inter', sans-serif;
font-size:18px;
margin:10px 0;
}

.desc{
color:#555;
line-height:1.6;
margin-bottom:20px;
}

/* OPÇÕES */
.opcoes{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.opcao{
border:1px solid #e5e5e5;
padding:12px;
border-radius:12px;
cursor:pointer;
font-family:'Inter', sans-serif;
display:flex;
justify-content:center;
}

.opcao input{display:none;}

.opcao.active{
background:#000;
color:#fff;
}

/* INPUT */
#dataInicio, #cep{
width:220px;
padding:10px;
border:none;
border-bottom:1px solid #ccc;
background:transparent;
font-family:'Inter';
}

/* DEVOLUÇÃO */
#devolucao{
margin-top:10px;
font-family:'Inter';
}

/* BOTÕES */
.btn{
margin-top:25px;
padding:18px;
background:#000;
color:#fff;
border-radius:40px;
text-align:center;
letter-spacing:4px;
font-size:12px;
cursor:pointer;
}

.btn-frete{
margin-top:10px;
padding:10px;
background:#000;
color:#fff;
border-radius:20px;
border:none;
}

/* FLATPICKR CUSTOM (luxo) */
.flatpickr-calendar{
border-radius:16px;
font-family:'Inter';
}

.flatpickr-day.selected{
background:#000;
border-color:#000;
}

.flatpickr-day.today{
border-color:#000;
}

.flatpickr-day.disabled{
color:#ccc;
}

@media(max-width:700px){
.produto{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<div class="produto">

<img src="https://i.imgur.com/2nCt3Sbl.jpg">

<div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

<div class="desc">
Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
</div>

<!-- OPÇÕES -->
<div class="opcoes">
<label class="opcao active"><input type="radio" name="dias" value="4" checked>4 dias • R$ 418,95</label>
<label class="opcao"><input type="radio" name="dias" value="7">7 dias • R$ 485,10</label>
<label class="opcao"><input type="radio" name="dias" value="10">10 dias • R$ 540,75</label>
<label class="opcao"><input type="radio" name="dias" value="15">15 dias • R$ 639,45</label>
<label class="opcao"><input type="radio" name="dias" value="20">20 dias • R$ 705,60</label>
<label class="opcao"><input type="radio" name="dias" value="30">30 dias • R$ 771,75</label>
</div>

<br>

<input type="text" id="dataInicio" placeholder="Selecione a data">

<div id="devolucao"></div>

<br>

<input type="text" id="cep" placeholder="Digite seu CEP">

<button class="btn-frete" onclick="calcularFrete()">Calcular frete</button>

<div id="freteResultado"></div>

<div class="btn" onclick="alugar()">ALUGAR AGORA</div>

</div>

</div>

</div>

<script>

/* seleção */
document.querySelectorAll('.opcao').forEach(opcao => {
  opcao.addEventListener('click', () => {
    document.querySelectorAll('.opcao').forEach(o => o.classList.remove('active'));
    opcao.classList.add('active');
    atualizarDevolucao();
  });
});

/* calendário luxo */
flatpickr("#dataInicio", {
  locale: "pt",
  dateFormat: "d/m/Y",
  minDate: new Date().fp_incr(3),
  disableMobile: true,
  onChange: function(selectedDates) {
    atualizarDevolucao();
  }
});

/* devolução */
function atualizarDevolucao(){

let dias = document.querySelector('input[name="dias"]:checked');
let dataInput = document.getElementById('dataInicio').value;

if(!dias || !dataInput) return;

let partes = dataInput.split("/");
let data = new Date(partes[2], partes[1]-1, partes[0]);

data.setDate(data.getDate() + parseInt(dias.value));

let formatada = data.toLocaleDateString('pt-BR', {
day:'2-digit',
month:'long'
});

document.getElementById('devolucao').innerHTML =
`Devolução prevista: <strong>${formatada}</strong>`;
}

/* frete */
async function calcularFrete(){

let cep = document.getElementById("cep").value;
let resultado = document.getElementById("freteResultado");

if(!cep){
resultado.innerHTML = "Digite o CEP";
return;
}

resultado.innerHTML = "Calculando...";

let response = await fetch("https://thebagroomtest.onrender.com/frete", {
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ to:{ postal_code:cep } })
});

let data = await response.json();

let html = "";

data
.filter(f => (f.name === "PAC" || f.name === "SEDEX"))
.filter(f => f.price && f.delivery_time)
.forEach(frete => {
html += `<div>${frete.name} • R$ ${parseFloat(frete.price).toFixed(2)} • ${frete.delivery_time} dias</div>`;
});

resultado.innerHTML = html || "Nenhuma opção disponível";
}

/* whatsapp */
function alugar(){

let dias = document.querySelector('input[name="dias"]:checked').value;
let data = document.getElementById('dataInicio').value;

if(!data){
alert("Escolha a data");
return;
}

let mensagem = `Olá! Quero alugar a Bvlgari Serpenti Verde
Data: ${data}
Período: ${dias} dias`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(mensagem)}`);

}

</script>

</body>
</html>
