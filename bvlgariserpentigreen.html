<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bvlgari Serpenti Verde · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Playfair Display', serif;
color:#111;
}

header{
padding:18px;
text-align:center;
position:fixed;
width:100%;
background:#fff;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:520px;
margin:auto;
padding:20px;
}

/* IMAGEM */
.galeria{
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.galeria img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
}

/* TEXTO */
.nome{
font-size:30px;
margin-bottom:5px;
}

.preco{
font-family:'Inter';
color:#666;
margin-bottom:15px;
}

.desc{
color:#777;
line-height:1.6;
margin-bottom:25px;
}

/* BOTÕES */
.opcoes{
display:flex;
flex-direction:column;
gap:10px;
}

.opcao{
border:1px solid #e8e8e8;
padding:14px 16px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-family:'Inter';
cursor:pointer;
transition:0.2s;
}

.opcao.active{
background:#000;
color:#fff;
border-color:#000;
}

.opcao span{
color:#777;
font-size:14px;
}

.opcao.active span{
color:#fff;
}

.opcao input{display:none;}

/* INPUTS */
input{
width:100%;
padding:14px 0;
border:none;
border-bottom:1px solid #ddd;
background:transparent;
font-family:'Inter';
margin-top:15px;
}

/* FRETE */
.frete-opcao{
border:1px solid #eee;
padding:12px;
border-radius:10px;
margin-top:8px;
text-align:center;
cursor:pointer;
font-family:'Inter';
}

.frete-opcao.active{
background:#000;
color:#fff;
}

/* BOTÃO FIXO */
.cta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:500px;
background:#000;
color:#fff;
padding:18px;
text-align:center;
border-radius:50px;
letter-spacing:5px;
font-size:12px;
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<div class="galeria">
<img src="https://i.imgur.com/moxJous.jpg">
</div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

<div class="desc">
Ícone da Bvlgari com fecho em formato de serpente, símbolo de elegância e poder.
</div>

<div class="opcoes">
<label class="opcao active">
<input type="radio" name="dias" value="4" checked>
4 dias <span>R$ 418,95</span>
</label>

<label class="opcao">
<input type="radio" name="dias" value="7">
7 dias <span>R$ 485,10</span>
</label>

<label class="opcao">
<input type="radio" name="dias" value="10">
10 dias <span>R$ 540,75</span>
</label>

<label class="opcao">
<input type="radio" name="dias" value="15">
15 dias <span>R$ 639,45</span>
</label>

<label class="opcao">
<input type="radio" name="dias" value="20">
20 dias <span>R$ 705,60</span>
</label>

<label class="opcao">
<input type="radio" name="dias" value="30">
30 dias <span>R$ 771,75</span>
</label>
</div>

<input type="text" id="dataInicio" placeholder="Selecione a data">
<div id="devolucao"></div>

<input type="text" id="cep" placeholder="Digite seu CEP">
<button onclick="calcularFrete()">Calcular frete</button>

<div id="freteResultado"></div>
<div id="freteSelecionado"></div>

</div>

<div class="cta" onclick="alugar()">ALUGAR AGORA</div>

<script>

/* seleção */
document.querySelectorAll('.opcao').forEach(o=>{
o.addEventListener('click',()=>{
document.querySelectorAll('.opcao').forEach(x=>x.classList.remove('active'));
o.classList.add('active');
atualizarDevolucao();
});
});

/* calendário */
flatpickr("#dataInicio",{
locale:"pt",
dateFormat:"d/m/Y",
minDate:new Date().fp_incr(3),
onChange:()=>atualizarDevolucao()
});

/* devolução */
function atualizarDevolucao(){
let dias=document.querySelector('input[name="dias"]:checked');
let data=document.getElementById('dataInicio').value;
if(!dias||!data)return;

let [d,m,y]=data.split("/");
let dt=new Date(y,m-1,d);
dt.setDate(dt.getDate()+parseInt(dias.value));

document.getElementById('devolucao').innerHTML=
`Devolução prevista: <strong>${dt.toLocaleDateString('pt-BR')}</strong>`;
}

/* frete */
let freteSelecionado=null;

async function calcularFrete(){

let cep=document.getElementById("cep").value;
let res=document.getElementById("freteResultado");

res.innerHTML="Calculando...";

let r=await fetch("https://thebagroomtest.onrender.com/frete",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({to:{postal_code:cep}})
});

let data=await r.json();

res.innerHTML="";

data.forEach(f=>{
let div=document.createElement("div");
div.className="frete-opcao";
div.innerHTML=`${f.name} • R$ ${parseFloat(f.price).toFixed(2)} • ${f.delivery_time} dias`;

div.onclick=()=>{
document.querySelectorAll('.frete-opcao').forEach(x=>x.classList.remove('active'));
div.classList.add('active');
freteSelecionado=f;

document.getElementById("freteSelecionado").innerHTML=
`Frete escolhido: ${f.name} • R$ ${parseFloat(f.price).toFixed(2)}`;
};

res.appendChild(div);
});

}

/* whatsapp */
function alugar(){

let dias=document.querySelector('input[name="dias"]:checked').value;
let data=document.getElementById('dataInicio').value;

if(!data||!freteSelecionado){
alert("Preencha tudo");
return;
}

let valor=document.querySelector('.opcao.active span').innerText;

let total=parseFloat(valor.replace("R$","").replace(",","."))
+parseFloat(freteSelecionado.price);

let msg=`Olá, quero alugar a Bvlgari Serpenti Verde

Data recebimento: ${data}
Período: ${dias} dias

Frete: ${freteSelecionado.name} • R$ ${freteSelecionado.price} • ${freteSelecionado.delivery_time} dias

Valor total: R$ ${total.toFixed(2).replace(".",",")}`;

window.open(`https://wa.me/5513996904227?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
