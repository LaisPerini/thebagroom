<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Validação • The Bag Room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
background:#f5f4f2;
font-family:'Inter',sans-serif;
color:#111;
}
header{
background:#fff;
padding:20px;
text-align:center;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:999;
}
header h1{
font-family:'Playfair Display',serif;
letter-spacing:6px;
font-size:24px;
}
.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}
.titulo{
font-family:'Playfair Display',serif;
font-size:32px;
margin-bottom:25px;
}
.card{
background:#fff;
border-radius:24px;
padding:28px;
margin-bottom:22px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
border:1px solid rgba(0,0,0,.03);
}

.card h3{
font-size:22px;
margin-bottom:15px;
}
.info{
margin-bottom:8px;
}
.status{
display:inline-block;
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:600;
margin-top:12px;
}


.links{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}
.links a{
background:#111;
color:#fff;
padding:12px 18px;
border-radius:30px;
text-decoration:none;
font-size:13px;
}
.botoes{
display:flex;
gap:12px;
margin-top:20px;
}
.btn{
border:none;
padding:14px 20px;
border-radius:30px;
cursor:pointer;
font-size:13px;
letter-spacing:1px;
}
.aprovar{
background:#111;
color:#fff;
}
.reprovar{
background:#e7e7e7;
}

.filtros{
display:flex;
gap:10px;
margin-bottom:25px;
flex-wrap:wrap;
}

.filtro-btn{
border:none;
background:#fff;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-size:13px;
letter-spacing:1px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
}

.filtro-btn:hover{
background:#111;
color:#fff;
}

.status.pendente{
background:#fff5d9;
color:#b8860b;
}

.status.aprovado{
background:#e8f8ee;
color:#15803d;
}

.status.reprovado{
background:#fdeaea;
color:#b91c1c;
}

.miniaturas{
display:flex;
gap:12px;
margin-top:20px;
margin-bottom:20px;
overflow-x:auto;
}

.thumb{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
border:1px solid #eee;
cursor:pointer;
transition:.3s;
}

.thumb:hover{
transform:scale(1.05);
}

.campo-busca{
width:100%;
padding:15px 20px;
border:none;
border-radius:18px;
background:#fff;
margin-bottom:25px;
font-size:15px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
outline:none;
}

</style>
</head>
<body>
  <script>

document.body.innerHTML = "";
alert("Acesso negado");
window.location.href = "/";
}

</script>
<header>
<h1>THE BAG ROOM</h1>
</header>
<div class="container">

<h2 class="titulo">
Validação de Clientes
</h2>

<div class="filtros">
<button class="filtro-btn" onclick="filtrarStatus('pendente')">
Pendentes
</button>

<button class="filtro-btn" onclick="filtrarStatus('aprovado')">
Aprovados
</button>

<button class="filtro-btn" onclick="filtrarStatus('reprovado')">
Reprovados
</button>

<button class="filtro-btn" onclick="filtrarStatus('todos')">
Todos
</button>
</div>

<input
type="text"
id="buscaCliente"
placeholder="Buscar por nome, e-mail ou Instagram..."
onkeyup="buscarCliente()"
class="campo-busca"
>


<div id="listaClientes"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zpyjnqkrsmgpwszqlcrs.supabase.co";
const SUPABASE_KEY = "sb_publishable_48rLPZfPRNtRX1kpYm0aWg_aVI1Hi2b";
const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
function getImagemUrl(caminho){
  if(!caminho) return "#";
  const { data } =
  supabaseClient.storage
  .from('documentos-clientes')
  .getPublicUrl(caminho);
  return data.publicUrl;
}
function renderizarClientes(clientes){

const lista =
document.getElementById('listaClientes');

lista.innerHTML='';

clientes.forEach(cliente=>{

const documentoUrl =
getImagemUrl(cliente.documento);

const selfieUrl =
getImagemUrl(cliente.selfie);

const comprovanteUrl =
getImagemUrl(cliente.comprovante);

lista.innerHTML += `
<div class="card">
...
</div>
`;

});

}

let todosClientes = [];

function filtrarStatus(status){

const lista =
document.getElementById('listaClientes');

lista.innerHTML = '';

let clientesFiltrados = todosClientes;

if(status !== 'todos'){
clientesFiltrados =
todosClientes.filter(cliente =>
cliente.status === status
);
}

clientesFiltrados.forEach(cliente=>{

const documentoUrl =
getImagemUrl(cliente.documento);

const selfieUrl =
getImagemUrl(cliente.selfie);

const comprovanteUrl =
getImagemUrl(cliente.comprovante);

lista.innerHTML += `
<div class="card">
<h3>${cliente.nome_completo}</h3>

<div class="info">
<strong>E-mail:</strong>
${cliente.email}
</div>

<div class="info">
<strong>Celular:</strong>
${cliente.celular}
</div>

<div class="info">
<strong>Instagram:</strong>
${cliente.instagram || '-'}
</div>

<div class="status ${cliente.status}">
${cliente.status}
</div>

<div class="miniaturas">

<a href="${documentoUrl}" target="_blank">
<img src="${documentoUrl}" class="thumb">
</a>

<a href="${selfieUrl}" target="_blank">
<img src="${selfieUrl}" class="thumb">
</a>

<a href="${comprovanteUrl}" target="_blank">
<img src="${comprovanteUrl}" class="thumb">
</a>

</div>

<div class="botoes">

<button
class="btn aprovar"
onclick="alterarStatus(${cliente.id},'aprovado')">
APROVAR
</button>

<button
class="btn reprovar"
onclick="alterarStatus(${cliente.id},'reprovado')">
REPROVAR
</button>

</div>
</div>
`;
});

}

function buscarCliente(){

const termo =
document.getElementById('buscaCliente')
.value
.toLowerCase();

const clientesFiltrados =
todosClientes.filter(cliente =>

(cliente.nome_completo || '')
.toLowerCase()
.includes(termo)

||

(cliente.email || '')
.toLowerCase()
.includes(termo)

||

(cliente.instagram || '')
.toLowerCase()
.includes(termo)

);

renderizarLista(clientesFiltrados);

}



async function carregarClientes(){
const { data, error } =
await supabaseClient
.from('validacao_clientes')
.select('*')
.order('id',{ascending:false});
if(error){
alert(error.message);
console.log(error);
return;
}

todosClientes = data;


const lista =
document.getElementById('listaClientes');
lista.innerHTML='';
data.forEach(cliente=>{
const documentoUrl =
getImagemUrl(cliente.documento);


const selfieUrl =
getImagemUrl(cliente.selfie);
const comprovanteUrl =
getImagemUrl(cliente.comprovante);
lista.innerHTML += `
<div class="card">
<h3>${cliente.nome_completo}</h3>
<div class="info">
<strong>E-mail:</strong>
${cliente.email}
</div>
<div class="info">
<strong>Celular:</strong>
${cliente.celular}
</div>
<div class="info">
<strong>Instagram:</strong>
${cliente.instagram || '-'}
</div>
<div class="status">
${cliente.status}
</div>
<div class="miniaturas">

<a href="${documentoUrl}" target="_blank">
<img src="${documentoUrl}" class="thumb">
</a>

<a href="${selfieUrl}" target="_blank">
<img src="${selfieUrl}" class="thumb">
</a>

<a href="${comprovanteUrl}" target="_blank">
<img src="${comprovanteUrl}" class="thumb">
</a>

</div>

<div class="botoes">

<button
class="btn aprovar"
onclick="alterarStatus(${cliente.id},'aprovado')">
APROVAR
</button>
<button
class="btn reprovar"
onclick="alterarStatus(${cliente.id},'reprovado')">
REPROVAR
</button>
</div>
</div>
`;
});
}
async function alterarStatus(id,status){

const { error } =
await supabaseClient
.from('validacao_clientes')
.update({
status:status
})
.eq('id',id);

if(error){
alert(error.message);
return;
}

carregarClientes();

}


carregarClientes();

</script>

</html>
