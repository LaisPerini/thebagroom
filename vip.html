<style>

body{
margin:0;
font-family:'Inter', sans-serif;
color:white;
text-align:center;
overflow:hidden;
height:100vh;
background:black;
}

/* VIDEO FUNDO */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
pointer-events:none;
}

/* camada bloqueando clique no vídeo */

.video-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* OVERLAY ESCURO */

.overlay{
background:rgba(0,0,0,0.55);
min-height:100vh;
padding:20px 20px;
}

.botao:first-of-type{
margin-top:-40px;
}

/* FOTO PERFIL */

.perfil{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
margin-bottom:10px;
}

/* USER */

.nome{
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
margin-bottom:30px;
}

.verificado{
width:18px;
}

/* LOGO */

.logo{
font-family:'Playfair Display', serif;
font-size:30px;
letter-spacing:6px;
margin-top:-5px;
margin-bottom:25px;
}

/* TEXTO */

.sub{
color:#e0e0e0;
margin-bottom:50px;
font-size:15px;
line-height:1.5;
}

/* BOTÕES */

.botao{
display:block;
background:white;
color:black;
padding:16px;
margin:14px auto;
width:90%;
max-width:420px;
text-decoration:none;
border-radius:14px;
font-size:17px;
font-weight:500;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
}

/* brilho botão VIP */

.vip::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
animation:brilho 3s infinite;
}

@keyframes brilho{
0%{left:-100%}
50%{left:100%}
100%{left:100%}
}

/* ICONES */

.icones{
display:flex;
justify-content:center;
gap:22px;
margin-top:35px;
}

.icone{
width:52px;
height:52px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

.icone img{
width:24px;
}
