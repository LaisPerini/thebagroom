<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f5f4f2;
font-family:'Playfair Display', serif;
color:#111;
}

/* remove flash iOS */
*{
-webkit-tap-highlight-color:transparent;
}

/* scroll suave */
html{
scroll-behavior:smooth;
}

/* HEADER */
header{
padding:18px;
display:flex;
justify-content:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:900px;
margin:auto;
padding:20px;
animation:fadeUp 0.6s ease;
}

/* HERO */
.hero{
margin-bottom:50px;
border-bottom:1px solid #eee;
padding-bottom:10px;
transition:transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.hero:active{
transform:scale(0.97);
}

.hero img{
width:100%;
border-radius:20px;
aspect-ratio:4/5;
object-fit:cover;
transition:transform 0.5s ease;
}

.hero:active img{
transform:scale(0.98);
}

.hero .nome{
font-size:17px;
font-weight:500;
letter-spacing:0.4px;
margin-top:14px;
}

.hero .preco{
font-family:'Inter';
color:#888;
font-size:14px;
margin-top:4px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px 14px;
margin-top:36px;
}

/* CARD */
.card{
text-decoration:none;
color:inherit;
display:block;
transition:transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

/* toque premium */
.card:active{
transform:scale(0.95);
}

/* imagem responde */
.card img{
width:100%;
border-radius:16px;
aspect-ratio:4/5;
object-fit:cover;
transition:transform 0.45s ease;
}

.card:active img{
transform:scale(0.97);
}

/* nome e preço */
.nome{
margin-top:12px;
margin-bottom:4px;
font-size:13.5px;
line-height:1.4;
font-weight:600;
}

.preco{
font-family:'Inter';
font-size:13px;
color:#8a8a8a;
margin-top:2px;
}

/* TAG */
.tag{
position:absolute;
top:10px;
left:10px;
font-size:10px;
padding:6px 14px;
border-radius:20px;
background:rgba(255,255,255,0.85);
color:#555;
backdrop-filter:blur(6px);
}

/* imagem container */
.img-box{
position:relative;
overflow:hidden;
border-radius:16px;
}

/* links limpos */
a,
a:visited,
a:hover,
a:active{
color:#111;
text-decoration:none;
}

/* animação entrada */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:700px){
.hero .nome{font-size:17px;}
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<!-- HERO -->
<a href="https://www.thebagroom.com.br/bvlgariserpentigreen.html" class="hero">

  <div class="img-box">
    <span class="tag">Destaque</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>

  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>

</a>

<!-- GRID -->
<div class="grid">

<a href="https://www.thebagroom.com.br/bvlgariserpentigreen.html" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>
</a>

<a href="#" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/zYxDCQTl.jpg">
  </div>
  <div class="nome">Chanel Classic</div>
  <div class="preco">A partir de R$ 350</div>
</a>

<a href="#" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>
</a>

<a href="#" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>
</a>

</div>

</div>

</body>
</html>
