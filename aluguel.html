<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f5f4f2;
font-family:'Playfair Display', serif;
color:#111;
}

{-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}

header{
padding:18px;
display:flex;
justify-content:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.hero{
margin-bottom:40px;
}

.hero img{
width:100%;
border-radius:20px;
aspect-ratio:4/5;
object-fit:cover;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px 14px;
}

.card{
display:block;
text-decoration:none;
color:#111;
}

.card img{
width:100%;
border-radius:16px;
aspect-ratio:4/5;
object-fit:cover;
}

.nome{
margin-top:10px;
display:flex;
flex-direction:column;
}

.marca{
font-size:16px;
font-weight:600;
}

.modelo{
font-size:14px;
color:#555;
}

.preco{
font-family:'Inter';
font-size:13px;
color:#777;
}

/ ===== BARRA ===== /
.barra-filtros{
display:flex;
gap:10px;
margin-bottom:20px;
}

.barra-filtros button,
.barra-filtros select{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
background:#fff;
}

/ ===== FILTRO ===== */
.filtro-modal{
position:fixed;
top:0;
left:-100%;
width:85%;
height:100vh;
background:#fff;
z-index:3000;
transition:0.4s;
}

.filtro-modal.open{
left:0;
}

.filtro-header{
display:flex;
justify-content:space-between;
padding:20px;
border-bottom:1px solid #eee;
}

.filtro-content{
padding:20px;
}

.grupo{margin-bottom:20px;}

.limpar{
margin-top:20px;
width:100%;
padding:12px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="container">

<!-- HERO -->
<div class="hero">
<img src="https://i.imgur.com/WmAbh2U.jpg">
</div>

<!-- BARRA -->
<div class="barra-filtros">
<button onclick="abrirFiltro()">☰ Filtrar</button>

<select onchange="ordenar(this.value)">
<option value="">Ordenar por</option>
<option value="menor">Menor preço</option>
<option value="maior">Maior preço</option>
</select>
</div>

<!-- FILTRO -->
<div class="filtro-modal" id="filtroModal">

<div class="filtro-header">
<h3>Filtrar</h3>
<span onclick="abrirFiltro()">✕</span>
</div>

<div class="filtro-content">

<div class="grupo">
<h4>Marca</h4>
<label><input type="checkbox" value="Bvlgari" class="filtro-marca"> Bvlgari</label>
<label><input type="checkbox" value="Gucci" class="filtro-marca"> Gucci</label>
</div>

<div class="grupo">
<h4>Cor</h4>
<label><input type="checkbox" value="verde" class="filtro-cor"> Verde</label>
<label><input type="checkbox" value="branco" class="filtro-cor"> Branco</label>
</div>

<button class="limpar" onclick="limparFiltros()">Limpar filtros</button>

</div>
</div>

<!-- GRID -->
<div class="grid">

<a class="card" data-marca="Bvlgari" data-cor="verde" data-preco="490">
<img src="https://i.imgur.com/27huvzI.jpg">
<div class="nome">
<span class="marca">Bvlgari</span>
<span class="modelo">Serpenti Forever</span>
</div>
<div class="preco">R$ 490</div>
</a>

<a class="card" data-marca="Gucci" data-cor="branco" data-preco="390">
<img src="https://i.imgur.com/EQ5uxW0.jpeg">
<div class="nome">
<span class="marca">Gucci</span>
<span class="modelo">Rajah</span>
</div>
<div class="preco">R$ 390</div>
</a>

</div>

</div>

<script>

function abrirFiltro(){
document.getElementById('filtroModal').classList.toggle('open');
}

function limparFiltros(){
document.querySelectorAll('input[type=checkbox]').forEach(i=>i.checked=false);
aplicarFiltros();
}

document.querySelectorAll('input').forEach(i=>{
i.addEventListener('change', aplicarFiltros);
});

function aplicarFiltros(){

const marcas = Array.from(document.querySelectorAll('.filtro-marca:checked')).map(i=>i.value);
const cores = Array.from(document.querySelectorAll('.filtro-cor:checked')).map(i=>i.value);

document.querySelectorAll('.card').forEach(card=>{

const okMarca = marcas.length===0 || marcas.includes(card.dataset.marca);
const okCor = cores.length===0 || cores.includes(card.dataset.cor);

card.style.display = (okMarca && okCor) ? 'block' : 'none';

});

}

function ordenar(tipo){

const grid = document.querySelector('.grid');
const cards = Array.from(document.querySelectorAll('.card'));

cards.sort((a,b)=>{
const aP = +a.dataset.preco;
const bP = +b.dataset.preco;

return tipo==="menor" ? aP-bP : bP-aP;
});

grid.innerHTML="";
cards.forEach(c=>grid.appendChild(c));

}

</script>

</body>
</html>
