<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Cormorant Garamond', serif;
color:#000;
}

/* HEADER */
header{
width:100%;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
position:fixed;
backdrop-filter:blur(10px);
z-index:999;
border-bottom:1px solid #eee;
}

header h1{
letter-spacing:8px;
font-size:22px;
margin:0;
}

.top-space{
height:70px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px;
padding:20px;
max-width:1000px;
margin:0 auto;
}

/* CARD CLICÁVEL */
.card{
text-decoration:none;
color:inherit;
display:block;
transition:0.3s ease;
}

/* LEVE MOVIMENTO */
.card:hover{
transform:translateY(-6px);
}

/* IMAGEM */
.img-box{
position:relative;
overflow:hidden;
border-radius:6px;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
transition:0.5s ease;
}

/* ZOOM SUAVE */
.card:hover img{
transform:scale(1.05);
}

/* TEXTO */
.nome{
margin-top:12px;
font-size:18px;
}

.preco{
font-size:16px;
color:#666;
margin-top:4px;
}

/* TAG */
.tag{
position:absolute;
top:10px;
left:10px;
font-size:12px;
color:#999;
background:rgba(255,255,255,0.8);
padding:4px 8px;
border-radius:20px;
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
</header>

<div class="top-space"></div>

<div class="grid">

<!-- PRODUTO 1 -->
<a href="serpenti-verde.html" class="card">

<div class="img-box">
<span class="tag">Disponível</span>
<img src="https://i.imgur.com/2nCt3Sbl.jpg">
</div>

<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">A partir de R$ 290</div>

</a>

<!-- PRODUTO 2 -->
<a href="chanel-classic.html" class="card">

<div class="img-box">
<span class="tag">Disponível</span>
<img src="https://i.imgur.com/zYxDCQTl.jpg">
</div>

<div class="nome">Chanel Classic</div>
<div class="preco">A partir de R$ 350</div>

</a>

</div>

</body>
</html>
