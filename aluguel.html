<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#faf9f7;
font-family:'Cormorant Garamond', serif;
color:#000;
padding-top: 80px;
}

/* HEADER */
header{
width:100%;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
position:fixed;
z-index:999;
border-bottom:1px solid #eee;
}

header h1{
letter-spacing:8px;
font-size:22px;
margin:0;
}

/* MENU */
.menu-mobile-btn{
position:absolute;
left:16px;
font-size:22px;
cursor:pointer;
}

/* HERO */
.internal-title{
height:35vh;
background:url('https://i.imgur.com/cEmhXKD.jpeg') center/cover;
display:flex;
align-items:center;
justify-content:center;
margin-top:0px;
position:relative;
}

.internal-title::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.internal-title h2{
position:relative;
color:white;
font-size:32px;
letter-spacing:6px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
padding:25px;
max-width:900px;
margin:0 auto;
}

/* CARD */
.card{
background:#fff;
border-radius:20px;
padding:14px;
text-align:center;
border:1px solid #eaeaea;
}

/* IMG */
.card img{
width:100%;
border-radius:14px;
object-fit:cover;
}

/* TEXTOS */
.nome{
margin-top:12px;
font-size:18px;
}

.preco{
font-size:14px;
color:#888;
margin-top:4px;
}

/* BOTÃO */
.botao{
display:block;
margin-top:12px;
padding:10px;
background:#000;
color:#fff;
border-radius:30px;
text-decoration:none;
font-size:12px;
letter-spacing:2px;
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>
<div class="menu-mobile-btn">☰</div>
</header>

<section class="internal-title">
<h2>CATÁLOGO</h2>
</section>

<div class="grid">

<div class="card">
<img src="https://i.imgur.com/2nCt3Sbl.jpg">
<div class="nome">Bvlgari Serpenti Verde</div>
<div class="preco">R$ 290</div>
<a class="botao" href="bvlgariserpentigreen.html">VER DETALHES</a>
</div>

<div class="card">
<img src="https://i.imgur.com/zYxDCQTl.jpg">
<div class="nome">Chanel Classic</div>
<div class="preco">R$ 350</div>
<a class="botao" href="#">VER DETALHES</a>
</div>

</div>

</body>
</html>
