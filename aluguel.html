<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f5f4f2;
font-family:'Playfair Display', serif;
color:#111;
}

{ -webkit-tap-highlight-color:transparent; }

html{ scroll-behavior:smooth; }

/ ================= HEADER ================= /
header{
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-family:'Cormorant Garamond', serif;
font-size:20px;
margin:0;
}

/ BOTÃO MENU /
.menu-mobile-btn{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
}

/ MENU /
.menu-mobile{
position:fixed;
top:0;
left:-100%;
width:80%;
max-width:320px;
height:100vh;
background:rgba(255,255,255,0.98);
backdrop-filter:blur(14px);
transition:0.4s cubic-bezier(0.22,1,0.36,1);
z-index:2000;
padding-top:100px;
}

.menu-mobile.open{
left:0;
}

.menu-mobile-inner{
display:flex;
flex-direction:column;
gap:28px;
padding-left:30px;
}

.menu-mobile-inner a{
font-family:'Cormorant Garamond', serif;
font-size:22px;
letter-spacing:1px;
text-decoration:none;
color:#000;
}

.close-menu{
position:absolute;
top:25px;
right:25px;
font-size:32px;
cursor:pointer;
}

/ ================= CONTAINER ================= /
.top-space{height:70px;}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/ ================= HERO ================= /
.hero{
margin-bottom:50px;
border-bottom:1px solid #eee;
padding-bottom:12px;
transition:0.3s;
}

.hero:active{ transform:scale(0.97); }

.hero img{
width:100%;
border-radius:20px;
aspect-ratio:4/5;
object-fit:cover;
}

.hero .nome{
font-size:17px;
margin-top:14px;
font-weight:500;
}

.hero .preco{
font-family:'Inter';
color:#888;
font-size:14px;
}

/ ================= GRID ================= /
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:28px 14px;
}

/ CARD /
.card{
text-decoration:none;
color:inherit;
display:block;
transition:0.3s;
}

.card:active{ transform:scale(0.95); }

.card img{
width:100%;
border-radius:16px;
aspect-ratio:4/5;
object-fit:cover;
}

.nome{
margin-top:12px;
font-size:13.5px;
font-weight:600;
}

.preco{
font-family:'Inter';
font-size:13px;
color:#8a8a8a;
}

/ TAG /
.tag{
position:absolute;
top:10px;
left:10px;
font-size:10px;
padding:6px 14px;
border-radius:20px;
background:rgba(255,255,255,0.9);
}

.img-box{
position:relative;
}

/ LINKS */
a{ text-decoration:none; color:#111; }

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <h1>THE BAG ROOM</h1>

  <div class="menu-mobile-btn" onclick="toggleMenuMobile()">☰</div>

  <nav class="menu-mobile" id="menuMobile">
    <div class="close-menu" onclick="toggleMenuMobile()">×</div>

    <div class="menu-mobile-inner">
      <a href="index.html">Início</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="Como Funciona.html">Como Desapegar</a>
      <a href="autenticidade.html">Autenticidade</a>
      <a href="quem-somos.html">Sobre</a>
    </div>
  </nav>
</header>

<div class="top-space"></div>

<div class="container">

<!-- HERO -->
<a href="https://www.thebagroom.com.br/bvlgariserpentigreen.html" class="hero">
  <div class="img-box">
    <span class="tag">Destaque</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>
</a>

<!-- GRID -->
<div class="grid">

<a href="https://www.thebagroom.com.br/bvlgariserpentigreen.html" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/moxJous.jpg">
  </div>
  <div class="nome">Bvlgari Serpenti Verde</div>
  <div class="preco">A partir de R$ 290</div>
</a>

<a href="#" class="card">
  <div class="img-box">
    <span class="tag">Disponível</span>
    <img src="https://i.imgur.com/zYxDCQTl.jpg">
  </div>
  <div class="nome">Chanel Classic</div>
  <div class="preco">A partir de R$ 350</div>
</a>

</div>

</div>

<script>
function toggleMenuMobile(){
document.getElementById('menuMobile').classList.toggle('open');
}
</script>

</body>
</html>
