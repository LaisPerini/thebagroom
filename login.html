<div class="form-group">

id="email"
type="email"

class="btn"
id="btnEntrar"
onclick="fazerLogin()">
ENTRAR
</button>

<a href="#">
Esqueci minha senha
</a>

<div class="links-cadastro">

Ainda não possui cadastro?

<br>
<a href="cadastro-locacao.html" id="linkCadastro">
Cadastre-se aqui
</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zpyjnqkrsmgpwszqlcrs.supabase.co";
const SUPABASE_KEY = "sb_publishable_48rLPZfPRNtRX1kpYm0aWg_aVI1Hi2b";
const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function destinoDepoisLogin(){
const params = new URLSearchParams(window.location.search);
const nextParam = params.get("next");
const nextLocal = localStorage.getItem("proximoDestinoTheBagRoom");
const destino = nextParam || nextLocal || "minha-conta.html";

if(destino.includes("checkout-aluguel.html")){
return "checkout-aluguel.html";
}

if(destino.includes("minha-conta.html")){
return "minha-conta.html";
}

return "minha-conta.html";
}

function prepararRetorno(){
const params = new URLSearchParams(window.location.search);
const next = params.get("next") || localStorage.getItem("proximoDestinoTheBagRoom");
const cadastro = document.getElementById("linkCadastro");

if(next){
localStorage.setItem("proximoDestinoTheBagRoom", next);

if(cadastro){
cadastro.href = `cadastro-locacao.html?next=${encodeURIComponent(next)}`;
}
}
}

async function fazerLogin(){
const email =
document.getElementById('email').value;
const senha =
document.getElementById('senha').value;
if(!email || !senha){
alert('Preencha e-mail e senha.');
return;
}
const btn =
document.getElementById('btnEntrar');
btn.disabled = true;
btn.innerText = 'ENTRANDO...';
const { data, error } =
await supabaseClient.auth.signInWithPassword({
email: email,
password: senha
});
if(error){
alert('E-mail ou senha inválidos.');
btn.disabled = false;
btn.innerText = 'ENTRAR';
return;
}
const destino = destinoDepoisLogin();
localStorage.removeItem("proximoDestinoTheBagRoom");
window.location.href = destino;
}

prepararRetorno();
</script>
<script>
function toggleMenuMobile() {
  const menu = document.getElementById('menuMobile');
  if (menu) menu.classList.toggle('open');
}
</script>
