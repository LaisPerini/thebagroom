<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta • The Bag Room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Inter',sans-serif;
min-height:100vh;
background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.45)
),
<img src="https://i.imgur.com/hxjrgAU.jpg">
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}
.container{
width:100%;
display:flex;
justify-content:center;
padding-top:50px;
padding-bottom:20px;
}
.login-card{
width:88%;
max-width:460px;
background:rgba(255,255,255,.94);
backdrop-filter:blur(15px);
padding:20px 26px;
border-radius:32px;
box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.logo{
font-family:'Playfair Display',serif;
letter-spacing:8px;
font-size:15px;
text-align:center;
margin-bottom:14px;
}
.titulo{
font-family:'Playfair Display',serif;
font-size:26px;
text-align:center;
margin-bottom:6px;
font-weight:600;
}
.subtitulo{
text-align:center;
line-height:1.5;
color:#666;
font-size:12px;
margin-bottom:18px;
}
.form-group{
margin-bottom:12px;
}
.form-group label{
display:block;
margin-bottom:8px;
font-size:12px;
letter-spacing:2px;
text-transform:uppercase;
}
.form-group input{
width:100%;
height:50px;
padding:0 16px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}
.btn{
width:100%;
height:48px;
border:none;
border-radius:40px;
background:#111;
color:#fff;
cursor:pointer;
letter-spacing:3px;
font-size:13px;
margin-top:4px;
}
.btn:hover{
opacity:.9;
}
.links{
text-align:center;
margin-top:12px;
}
.links a{
display:block;
margin-top:10px;
text-decoration:none;
color:#666;
font-size:14px;
}
.divisor{
margin:12px 0;
height:1px;
background:#eee;
}
.links-cadastro{
text-align:center;
font-size:14px;
color:#666;
line-height:1.7;
}
.links-cadastro a{
color:#111;
text-decoration:none;
font-weight:500;
}
.links-cadastro a:hover{
text-decoration:underline;
}
@media(max-width:768px){
.login-card{
padding:30px;
}
.titulo{
font-size:26px;
}
}
</style>
</head>
<body>
<div class="container">
<div class="login-card">
<div class="logo">
THE BAG ROOM
</div>
<h1 class="titulo">
Minha Conta
</h1>
<p class="subtitulo">
Acompanhe seu cadastro, futuras locações e informações da sua conta The Bag Room.
</p>
<div class="form-group">
<label>E-mail</label>
<input
id="email"
type="email"
placeholder="Digite seu e-mail">
</div>
<div class="form-group">
<label>Senha</label>
<input
id="senha"
type="password"
placeholder="Digite sua senha">
</div>

<button
class="btn"
id="btnEntrar"
onclick="fazerLogin()">
ENTRAR
</button>

<div class="links">
<a href="#">
Esqueci minha senha
</a>
</div>
<div class="divisor"></div>
<div class="links-cadastro">

Ainda não possui cadastro?

<br>
<a href="cadastro-locacao.html">
Cadastre-se aqui
</a>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://zpyjnqkrsmgpwszqlcrs.supabase.co";
const SUPABASE_KEY = "sb_publishable_48rLPZfPRNtRX1kpYm0aWg_aVI1Hi2b";
const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);
async function fazerLogin(){
const email =
document.getElementById('email').value;
const senha =
document.getElementById('senha').value;
if(!email || !senha){
alert('Preencha e-mail e senha.');
return;
}
const btn =
document.getElementById('btnEntrar');
btn.disabled = true;
btn.innerText = 'ENTRANDO...';
const { data, error } =
await supabaseClient.auth.signInWithPassword({
email: email,
password: senha
});
if(error){
alert('E-mail ou senha inválidos.');
btn.disabled = false;
btn.innerText = 'ENTRAR';
return;
}
window.location.href =
'minha-conta.html';
}
</script>
</body>
</html>
