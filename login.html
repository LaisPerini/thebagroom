<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área da Cliente • The Bag Room</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
font-family:'Inter',sans-serif;
min-height:100vh;
background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.45)
),
url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000');
background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:auto;
min-height:auto;
}
.container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px 0;
padding-top:10;
align-items:flex-start;
}
.login-card{
width:88%;
max-width:460px;
background:rgba(255,255,255,.94);
backdrop-filter:blur(15px);
padding:20px 26px;
border-radius:32px;
box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.logo{
font-family:'Playfair Display',serif;
letter-spacing:8px;
font-size:15px;
text-align:center;
margin-bottom:14px;
}
.titulo{
font-family:'Playfair Display',serif;
font-size:26px;
text-align:center;
margin-bottom:6px;
font-weight:600;
}
.subtitulo{
text-align:center;
line-height:1.5;
color:#666;
font-size:12px;
margin-bottom:14px;
}
.seguro{
background:#fafafa;
border:1px solid #efefef;
padding:6px;
border-radius:16px;
text-align:center;
font-size:12px;
color:#555;
line-height:1.6;
margin-bottom:14px;
}
.form-group{
margin-bottom:12px;
}

.form-group input{
width:100%;
height:46px;
padding:0 18px;
border:1px solid #e2e2e2;
border-radius:14px;
font-size:15px;
}
.form-group input{
width:100%;
height:50px;
padding:0 16px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}
.btn{
width:100%;
height:48px;
border:none;
border-radius:40px;
background:#111;
color:#fff;
cursor:pointer;
letter-spacing:3px;
font-size:13px;
margin-top:4px;
}
.btn:hover{
opacity:.9;
}
.links{
text-align:center;
margin-top:12px;
}
.links a{
display:block;
margin-top:10px;
text-decoration:none;
color:#666;
font-size:14px;
}
.divisor{
    display:none;
}
.criar-conta{
text-align:center;
}
.criar-conta p{
font-size:13px;
color:#666;
line-height:1.5;
margin-bottom:10px;
}
.btn-secundario{
display:inline-block;
padding:10px 24px;
border:1px solid #111;
border-radius:40px;
text-decoration:none;
color:#111;
font-size:13px;
letter-spacing:2px;
}
.btn-secundario:hover{
background:#111;
color:#fff;
}
@media(max-width:768px){
.login-card{
padding:30px;
}
.titulo{
font-size:34px;
}
}
</style>
</head>
<body>
<div class="container">
<div class="login-card">
<div class="logo">
THE BAG ROOM
</div>
<h1 class="titulo">
Área da Cliente
</h1>
<p class="subtitulo">
Acompanhe seu cadastro, futuras locações e informações da sua conta The Bag Room.
</p>

<div class="form-group">
<label>E-mail</label>
<input
type="email"
placeholder="Digite seu e-mail">
</div>
<div class="form-group">
<label>Senha</label>
<input
type="password"
placeholder="Digite sua senha">
</div>
<button class="btn">
ENTRAR
</button>
<div class="links">
<a href="#">
Esqueci minha senha
</a>
</div>
<div class="divisor"></div>
<div class="criar-conta">
<p>
Cadastro aprovado e ainda não criou sua senha?
</p>
<a href="#" class="btn-secundario">
CRIAR SENHA
</a>
</div>
</div>
</div>
</body>
</html>
