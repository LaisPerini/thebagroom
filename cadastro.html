<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro · The Bag Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
background:#f5f4f2;
font-family:'Playfair Display', serif;
color:#111;
}

/* HEADER */
header{
padding:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.95);
position:fixed;
width:100%;
border-bottom:1px solid #eee;
z-index:999;
}

header h1{
letter-spacing:6px;
font-size:20px;
margin:0;
}

.top-space{height:70px;}

/* MENU */
.menu-mobile-btn{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
}

.menu-mobile{
position:fixed;
top:0;
left:-100%;
width:85%;
max-width:320px;
height:100vh;
background:rgba(255,255,255,0.98);
backdrop-filter:blur(14px);
transition:0.45s;
z-index:2000;
padding-top:100px;
}

.menu-mobile.open{left:0;}

.close-menu{
position:absolute;
top:24px;
right:24px;
font-size:30px;
cursor:pointer;
}

.menu-mobile-inner{
display:flex;
flex-direction:column;
gap:26px;
padding-left:30px;
}

.menu-mobile-inner a{
font-size:22px;
text-decoration:none;
color:#000;
}

/* HERO */
.internal-title{
width:100%;
height:26vh;
background:url('https://i.imgur.com/cEmhXKD.jpeg') center top/cover;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.internal-title::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.internal-title h2{
position:relative;
color:#fff;
letter-spacing:5px;
font-size:28px;
}

/* BOX */
.content-box{
max-width:900px;
margin:40px auto;
padding:28px;
background:#fff;
border-radius:18px;
}

/* FORM */
.form-group{
margin-bottom:18px;
}

label{
font-family:'Inter';
font-size:12px;
color:#777;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #e5e5e5;
font-family:'Inter';
font-size:14px;
}

input[type="file"]{
padding:10px;
background:#fafafa;
}

/* BOTÃO */
.btn{
margin-top:20px;
width:100%;
padding:18px;
background:#000;
color:#fff;
border:none;
border-radius:40px;
letter-spacing:4px;
font-size:12px;
cursor:pointer;
}

/* TEXTO LGPD */
.info{
font-family:'Inter';
font-size:12px;
color:#777;
margin-top:20px;
line-height:1.6;
}

/* FOOTER */
.footer-luxo {
  margin-top: 80px;
  border-top: 1px solid #eaeaea;
  font-family: 'Inter', sans-serif;
}

.footer-item {
  padding: 20px;
  border-bottom: 1px solid #eaeaea;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.footer-content {
  display: none;
  padding-top: 10px;
  font-size: 13px;
  color: #555;
}

.footer-item.active .footer-content {
  display: block;
}

.footer-bottom {
  padding: 30px;
  text-align:center;
  font-size:12px;
  color:#777;
}

</style>
</head>

<body>

<header>
<h1>THE BAG ROOM</h1>

<div class="menu-mobile-btn" onclick="toggleMenuMobile()">☰</div>

<nav class="menu-mobile" id="menuMobile">
<div class="close-menu" onclick="toggleMenuMobile()">×</div>

<div class="menu-mobile-inner">
<a href="index.html">Início</a>
<a href="aluguel.html">Alugar</a>
<a href="Como Funciona.html">Como Desapegar</a>
<a href="autenticidade.html">Autenticidade</a>
<a href="quem-somos.html">Sobre</a>
</div>
</nav>
</header>

<div class="top-space"></div>

<section class="internal-title">
<h2>CADASTRO</h2>
</section>

<div class="content-box">

<form action="https://formsubmit.co/seuemail@gmail.com" method="POST" enctype="multipart/form-data">

<div class="form-group">
<label>Nome completo</label>
<input type="text" name="nome" required>
</div>

<div class="form-group">
<label>Endereço</label>
<input type="text" name="endereco" required>
</div>

<div class="form-group">
<label>CEP</label>
<input type="text" name="cep" required>
</div>

<div class="form-group">
<label>Estado</label>
<input type="text" name="estado" required>
</div>

<div class="form-group">
<label>Celular</label>
<input type="tel" name="celular" required>
</div>

<div class="form-group">
<label>Instagram</label>
<input type="text" name="instagram">
</div>

<div class="form-group">
<label>Documento (RG ou CNH)</label>
<input type="file" name="documento" required>
</div>

<div class="form-group">
<label>Selfie com documento</label>
<input type="file" name="selfie" required>
</div>

<div class="form-group">
<label>Comprovante de residência</label>
<input type="file" name="comprovante" required>
</div>

<button class="btn" type="submit">ENVIAR CADASTRO</button>

</form>

<p class="info">
Seus dados serão utilizados exclusivamente para validação de identidade e segurança da locação.
</p>

</div>

<div class="footer-luxo">

<div class="footer-item" onclick="toggleFooter(this)">
PRECISA DE AJUDA?
<span>▾</span>
<div class="footer-content">
WhatsApp: (13) 99690-4227
</div>
</div>

<div class="footer-item" onclick="toggleFooter(this)">
ENDEREÇO
<span>▾</span>
<div class="footer-content">
Av. Ana Costa, 471 – Santos
</div>
</div>

<div class="footer-bottom">
© 2026 The Bag Room
</div>

</div>

<script>
function toggleMenuMobile(){
document.getElementById('menuMobile').classList.toggle('open');
}

function toggleFooter(el){
el.classList.toggle('active');
}
</script>

</body>
</html>
